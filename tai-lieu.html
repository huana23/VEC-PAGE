<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tài liệu vận hành ETC</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        font-family: system-ui;
      }

      .menu-item {
        transition: all 0.2s;
      }

      mark.search {
        background: #fde047;
        padding: 2px;
      }

      mark.active {
        background: #f97316;
        color: white;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <!-- HEADER -->

    <div class="bg-blue-600 text-white p-4 flex items-center justify-between">
      <div class="text-lg md:text-xl font-bold">Tài liệu vận hành ETC</div>

      <button onclick="toggleSidebar()" class="md:hidden text-2xl">☰</button>
    </div>

    <div class="flex h-[calc(100vh-64px)]">
      <!-- overlay -->

      <div
        id="overlay"
        class="fixed inset-0 bg-black bg-opacity-40 hidden z-20 md:hidden"
        onclick="toggleSidebar()"
      ></div>

      <!-- SIDEBAR -->

      <div
        id="sidebar"
        class="fixed md:static z-30 top-0 left-0 h-full w-72 bg-white border-r transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto"
      >
        <div class="p-4 font-bold border-b">Mục lục</div>

        <ul class="text-sm">
          <li
            class="menu-item p-3 hover:bg-gray-100 cursor-pointer"
            onclick="loadDoc('page-docs/mucdich.html', this)"
          >
            Mục đích và phạm vi áp dụng
          </li>

          <li
            class="menu-item p-3 hover:bg-gray-100 cursor-pointer"
            onclick="loadDoc('page-docs/vanban.html', this)"
          >
            Văn bản pháp luật
          </li>

          <li
            class="menu-item p-3 hover:bg-gray-100 cursor-pointer"
            onclick="loadDoc('page-docs/chuong1.html', this)"
          >
            Chương I - Quy trình vận hành ETC
          </li>

          <li
            class="menu-item p-3 hover:bg-gray-100 cursor-pointer"
            onclick="loadDoc('page-docs/chuong2.html', this)"
          >
            Chương II - Nghiệp vụ vận hành
          </li>

          <li
            class="menu-item p-3 hover:bg-gray-100 cursor-pointer"
            onclick="loadDoc('page-docs/chuong3.html', this)"
          >
            Chương III - Bộ phận kỹ thuật
          </li>
        </ul>
      </div>

      <!-- CONTENT -->

      <div class="flex-1 p-4 md:p-8 overflow-y-auto">
        <!-- SEARCH BAR -->

        <div
          class="mb-4 bg-white p-3 rounded shadow flex flex-wrap md:flex-nowrap items-center gap-2 sticky top-0 z-20"
        >
          <input
            id="searchInput"
            type="text"
            placeholder="🔎 Tìm kiếm trong tài liệu..."
            class="flex-1 min-w-[120px] border p-2 rounded text-sm"
          />

          <button id="prevBtn" class="px-2 py-2 bg-gray-200 rounded text-sm">
            ⬆
          </button>
          <button id="nextBtn" class="px-2 py-2 bg-gray-200 rounded text-sm">
            ⬇
          </button>
          <button
            id="clearBtn"
            class="px-2 py-2 bg-red-500 text-white rounded text-sm"
          >
            ✕
          </button>

          <div id="resultCount" class="text-sm text-gray-500 ml-2">
            0 kết quả
          </div>
        </div>

        <div id="content" class="bg-white p-4 md:p-6 rounded shadow">
          <h2 class="text-lg md:text-xl font-bold mb-4">
            Chọn mục lục bên trái để xem tài liệu
          </h2>
        </div>
      </div>
    </div>

    <script>
      let originalContent = "";
      let results = [];
      let currentIndex = 0;

      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");

        sidebar.classList.toggle("-translate-x-full");
        overlay.classList.toggle("hidden");
      }

      async function loadDoc(file, element) {
        document.querySelectorAll(".menu-item").forEach((item) => {
          item.classList.remove(
            "bg-blue-100",
            "text-blue-600",
            "font-semibold",
          );
        });

        element.classList.add("bg-blue-100", "text-blue-600", "font-semibold");

        const res = await fetch(file);
        const html = await res.text();

        document.getElementById("content").innerHTML = html;

        originalContent = html;

        document.getElementById("searchInput").value = "";

        results = [];
        currentIndex = 0;

        document.getElementById("resultCount").innerText = "0 kết quả";

        if (window.innerWidth < 768) {
          toggleSidebar();
        }
      }

      function searchContent() {
        const keyword = document.getElementById("searchInput").value.trim();

        const content = document.getElementById("content");

        if (keyword === "") {
          content.innerHTML = originalContent;
          document.getElementById("resultCount").innerText = "0 kết quả";
          return;
        }

        const regex = new RegExp(`(${keyword})`, "gi");

        content.innerHTML = originalContent.replace(
          regex,
          '<mark class="search">$1</mark>',
        );

        results = document.querySelectorAll(".search");

        currentIndex = 0;

        updateSearchUI();
      }

      function updateSearchUI() {
        document.querySelectorAll(".search").forEach((el) => {
          el.classList.remove("active");
        });

        if (results.length > 0) {
          results[currentIndex].classList.add("active");

          const yOffset = -100; // chỉnh theo chiều cao search bar
          const y =
            results[currentIndex].getBoundingClientRect().top +
            window.pageYOffset +
            yOffset;

          window.scrollTo({
            top: y,
            behavior: "smooth",
          });
        }

        document.getElementById("resultCount").innerText =
          results.length + " kết quả";
      }

      function nextResult() {
        if (results.length === 0) return;

        currentIndex++;

        if (currentIndex >= results.length) {
          currentIndex = 0;
        }

        updateSearchUI();
      }

      function prevResult() {
        if (results.length === 0) return;

        currentIndex--;

        if (currentIndex < 0) {
          currentIndex = results.length - 1;
        }

        updateSearchUI();
      }

      function clearSearch() {
        document.getElementById("searchInput").value = "";
        document.getElementById("content").innerHTML = originalContent;
        document.getElementById("resultCount").innerText = "0 kết quả";

        results = [];
        currentIndex = 0;
      }

      document
        .getElementById("searchInput")
        .addEventListener("input", searchContent);

      document
        .getElementById("searchInput")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            nextResult();
          }
        });

      document.getElementById("nextBtn").onclick = nextResult;
      document.getElementById("prevBtn").onclick = prevResult;
      document.getElementById("clearBtn").onclick = clearSearch;

      window.onload = () => {
        const first = document.querySelector(".menu-item");
        loadDoc("page-docs/mucdich.html", first);
      };
    </script>
  </body>
</html>
